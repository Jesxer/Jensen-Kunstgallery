<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gudrun Jensen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,450;9..144,600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* =========================================================
   KONFIGURATION — hier deine GitHub-Daten eintragen
   ========================================================= */
</style>
<script>
  const CONFIG = {
    owner: "Jesxer",   // z.B. "Jesxer"
    repo:  "Jensen-Kunstgallery",           // z.B. "kunstgalerie"
    branch: "main"
  };
</script>
<style>
  :root{
    --wall: #161513;
    --wall-deep: #0e0d0c;
    --mat: #211f1c;
    --ink: #ece7de;
    --ink-dim: #948d81;
    --brass: #b3925c;
    --brass-dim: #6f5c3c;
    --danger: #c46a5a;
    --r: 2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--wall);
    background-image: radial-gradient(ellipse at 50% -10%, #201f1b 0%, var(--wall) 55%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{ background: var(--brass); color: var(--wall-deep); }

  a, button { font-family: inherit; }

  /* Header */
  header{
    padding: 4.5rem 6vw 2.5rem;
    text-align:center;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 1rem;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight: 450;
    font-size: clamp(2.2rem, 6vw, 4rem);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .sub{
    color: var(--ink-dim);
    font-size: 0.95rem;
    margin-top: 0.9rem;
    font-weight: 400;
  }

  /* Gallery */
  main{ padding: 1rem 4vw 8rem; }
  .empty{
    text-align:center;
    padding: 6rem 1rem;
    color: var(--ink-dim);
    font-family:'Fraunces', serif;
    font-size: 1.3rem;
    font-style: italic;
  }
  .empty small{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-style: normal;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    margin-top: 0.8rem;
    color: var(--brass-dim);
  }

  .group-section{ margin-bottom: 3.5rem; }
  .group-heading{
    display:flex; align-items:baseline; gap: 0.7rem;
    margin: 0 0 1.4rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid #2c2a25;
  }
  .group-heading h2{
    font-family:'Fraunces', serif;
    font-weight: 450;
    font-size: 1.4rem;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .group-heading .edit-group{
    display:none;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.05em;
    color: var(--ink-dim);
    background:none; border: 1px solid #3a362f; border-radius: 999px;
    padding: 0.2rem 0.6rem; cursor:pointer;
  }
  .group-heading .edit-group:hover{ color: var(--brass); border-color: var(--brass-dim); }
  body.curator .group-heading .edit-group{ display:inline-block; }

  .grid{
    column-width: 320px;
    column-gap: 2.2rem;
  }
  figure{
    break-inside: avoid;
    margin: 0 0 2.2rem;
    background: var(--mat);
    padding: 14px 14px 0;
    border-radius: var(--r);
    box-shadow: 0 18px 40px -20px rgba(0,0,0,0.7), 0 2px 0 rgba(255,255,255,0.02) inset;
    position: relative;
    cursor: zoom-in;
    transition: transform .35s ease;
  }
  figure:hover{ transform: translateY(-3px); }
  figure img{
    width:100%;
    display:block;
    border-radius: 1px;
  }
  figcaption{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.7rem 0.15rem 0.9rem;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.04em;
    color: var(--ink-dim);
  }
  figcaption .num{ color: var(--brass); }
  figure .del{
    position:absolute; top:8px; right:8px;
    background: rgba(14,13,12,0.85);
    color: var(--ink);
    border:1px solid var(--brass-dim);
    border-radius: 50%;
    width: 26px; height: 26px;
    display:none; align-items:center; justify-content:center;
    cursor:pointer; font-size: 14px; line-height:1;
  }
  body.curator figure .del{ display:flex; }

  /* Lightbox */
  .lightbox{
    position: fixed; inset: 0; background: rgba(9,8,7,0.94);
    display:none; align-items:center; justify-content:center;
    z-index: 200; padding: 5vh 5vw;
    backdrop-filter: blur(6px);
  }
  .lightbox.open{ display:flex; }
  .lightbox img{ max-width:100%; max-height: 88vh; box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
  .lightbox .close{
    position:absolute; top: 24px; right: 32px;
    color: var(--ink-dim); background:none; border:none;
    font-size: 1.6rem; cursor:pointer;
  }
  .lightbox .close:hover{ color: var(--ink); }

  /* Drop overlay */
  .dropzone{
    position: fixed; inset: 0; z-index: 150;
    display:none; align-items:center; justify-content:center;
    border: 2px dashed var(--brass);
    margin: 20px;
    background: rgba(179,146,92,0.08);
    color: var(--brass);
    font-family:'Fraunces', serif;
    font-size: 1.6rem;
    pointer-events:none;
  }
  body.dragging .dropzone{ display:flex; }

  /* Curator controls */
  .curator-bar{
    position: fixed; bottom: 22px; right: 22px; z-index: 100;
    display:flex; gap: 0.6rem; align-items:center;
  }
  .curator-bar button, .curator-bar label, .curator-bar select{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.68rem; letter-spacing: 0.05em;
    background: var(--mat); color: var(--ink-dim);
    border: 1px solid #3a362f; border-radius: 999px;
    padding: 0.55rem 1rem; cursor:pointer;
    transition: color .2s, border-color .2s;
  }
  .curator-bar button:hover, .curator-bar label:hover, .curator-bar select:hover{
    color: var(--brass); border-color: var(--brass-dim);
  }
  .curator-bar select{ max-width: 140px; }
  body.curator .curator-bar .login-only{ display:none; }
  .curator-bar .logged-only{ display:none; }
  body.curator .curator-bar .logged-only{ display:inline-flex; }

  .status{
    position: fixed; bottom: 22px; left: 22px; z-index: 100;
    font-family:'IBM Plex Mono', monospace; font-size: 0.7rem;
    color: var(--ink-dim); max-width: 40ch;
  }
  .status.err{ color: var(--danger); }

  input[type=file]{ display:none; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Werke von</div>
  <h1>Gudrun Jensen</h1>
  <div class="sub">Eine kuratierte Wand — ausschließlich Bilder.</div>
</header>

<main>
  <div id="empty" class="empty" style="display:none">
    Die Wand ist noch leer.
    <small>Über den Kurator-Zugang unten rechts können Werke hinzugefügt werden.</small>
  </div>
  <div id="sections"></div>
  <div id="grid" class="grid" style="display:none"></div>
</main>

<div class="dropzone" id="dropzone">Bild hier ablegen</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lbClose">&times;</button>
  <img id="lbImg" src="" alt="">
</div>

<div class="status" id="status"></div>

<div class="curator-bar">
  <button class="login-only" id="loginBtn">Kurator-Zugang</button>
  <select class="logged-only" id="groupSelect" title="Gruppe für neue Bilder"></select>
  <button class="logged-only" id="addGroupBtn">+ Gruppe</button>
  <label class="logged-only" for="fileInput">+ Bild hinzufügen</label>
  <input type="file" id="fileInput" accept="image/*" multiple>
  <button class="logged-only" id="logoutBtn">Abmelden</button>
</div>

<script>
(function(){
  const API = "https://api.github.com/repos/" + CONFIG.owner + "/" + CONFIG.repo;
  const RAW = "https://raw.githubusercontent.com/" + CONFIG.owner + "/" + CONFIG.repo + "/" + CONFIG.branch;
  const grid = document.getElementById('grid');
  const sectionsEl = document.getElementById('sections');
  const emptyEl = document.getElementById('empty');
  const statusEl = document.getElementById('status');
  const TOKEN_KEY = 'galerie_pat';

  function setStatus(msg, isErr){
    statusEl.textContent = msg || '';
    statusEl.className = 'status' + (isErr ? ' err' : '');
  }
  function getToken(){ return localStorage.getItem(TOKEN_KEY); }

  function applyCuratorState(){
    document.body.classList.toggle('curator', !!getToken());
  }

  /* ---------- Manifest laden & rendern ----------
     Format: { groups: ["Name1","Name2"], images: [{file,title,group}] }
     Ältere Manifeste (einfaches Array ohne Gruppen) werden automatisch migriert. */
  let manifest = { groups: [], images: [] };
  const UNGROUPED = '';
  const UNGROUPED_LABEL = 'Ohne Gruppe';

  function normalizeManifest(raw){
    if(Array.isArray(raw)){
      return { groups: [], images: raw.map(it => ({ file: it.file, title: it.title, group: it.group || UNGROUPED })) };
    }
    return {
      groups: (raw && raw.groups) || [],
      images: ((raw && raw.images) || []).map(it => ({ file: it.file, title: it.title, group: it.group || UNGROUPED }))
    };
  }

  async function loadManifest(){
    try{
      const res = await fetch(RAW + "/images/manifest.json?_=" + Date.now());
      if(!res.ok) throw new Error("kein Manifest gefunden");
      manifest = normalizeManifest(await res.json());
    }catch(e){
      manifest = { groups: [], images: [] };
    }
    render();
    populateGroupSelect();
  }

  function render(){
    sectionsEl.innerHTML = '';
    emptyEl.style.display = manifest.images.length ? 'none' : 'block';

    const sections = manifest.groups.map(g => ({ name: g, items: [] }));
    const ungrouped = { name: UNGROUPED, items: [] };
    manifest.images.forEach(item => {
      const section = sections.find(s => s.name === item.group);
      (section || ungrouped).items.push(item);
    });
    if(ungrouped.items.length) sections.push(ungrouped);

    sections.forEach(section => {
      if(!section.items.length && section.name !== UNGROUPED) {
        if(!document.body.classList.contains('curator')) return; // leere Gruppen nur im Kurator-Modus zeigen
      }
      const sec = document.createElement('div');
      sec.className = 'group-section';

      const heading = document.createElement('div');
      heading.className = 'group-heading';
      heading.innerHTML =
        '<h2>' + (section.name || UNGROUPED_LABEL) + '</h2>' +
        (section.name ? '<button class="edit-group">umbenennen</button>' : '');
      if(section.name){
        heading.querySelector('.edit-group').addEventListener('click', () => renameGroup(section.name));
      }
      sec.appendChild(heading);

      const secGrid = document.createElement('div');
      secGrid.className = 'grid';
      section.items.forEach((item, i) => {
        const fig = document.createElement('figure');
        fig.innerHTML =
          '<img loading="lazy" src="' + RAW + '/images/' + encodeURIComponent(item.file) + '" alt="' + (item.title || '') + '">' +
          '<figcaption><span>' + (item.title || item.file) + '</span><span class="num">' + String(i+1).padStart(2,'0') + '</span></figcaption>' +
          '<div class="del" title="Entfernen">&times;</div>';
        fig.querySelector('img').addEventListener('click', () => openLightbox(fig.querySelector('img').src));
        fig.querySelector('.del').addEventListener('click', (ev) => { ev.stopPropagation(); removeImage(item); });
        secGrid.appendChild(fig);
      });
      sec.appendChild(secGrid);
      sectionsEl.appendChild(sec);
    });
  }

  function populateGroupSelect(){
    const sel = document.getElementById('groupSelect');
    sel.innerHTML = '<option value="">' + UNGROUPED_LABEL + '</option>' +
      manifest.groups.map(g => '<option value="' + g.replace(/"/g,'&quot;') + '">' + g + '</option>').join('');
  }

  async function addGroup(){
    if(!getToken()) return;
    const name = prompt('Name der neuen Gruppe:');
    if(!name) return;
    const trimmed = name.trim();
    if(!trimmed || manifest.groups.includes(trimmed)) return;
    try{
      const updated = Object.assign({}, manifest, { groups: manifest.groups.concat([trimmed]) });
      await saveManifest(updated, 'Gruppe hinzugefügt: ' + trimmed);
      render();
      populateGroupSelect();
      document.getElementById('groupSelect').value = trimmed;
      setStatus('Gruppe „' + trimmed + '" angelegt.');
    }catch(e){
      setStatus(e.message, true);
    }
  }

  async function renameGroup(oldName){
    if(!getToken()) return;
    const name = prompt('Neuer Name für die Gruppe „' + oldName + '":', oldName);
    if(!name) return;
    const trimmed = name.trim();
    if(!trimmed || trimmed === oldName) return;
    try{
      const groups = manifest.groups.map(g => g === oldName ? trimmed : g);
      const images = manifest.images.map(it => it.group === oldName ? Object.assign({}, it, { group: trimmed }) : it);
      const updated = { groups, images };
      await saveManifest(updated, 'Gruppe umbenannt: ' + oldName + ' → ' + trimmed);
      render();
      populateGroupSelect();
      setStatus('Gruppe umbenannt in „' + trimmed + '".');
    }catch(e){
      setStatus(e.message, true);
    }
  }

  /* ---------- Lightbox ---------- */
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  function openLightbox(src){ lbImg.src = src; lb.classList.add('open'); }
  function closeLightbox(){ lb.classList.remove('open'); lbImg.src=''; }
  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  lb.addEventListener('click', (e) => { if(e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeLightbox(); });

  /* ---------- GitHub Hilfsfunktionen ---------- */
  async function ghGet(path){
    const res = await fetch(API + "/contents/" + path, {
      headers: { Authorization: "Bearer " + getToken(), Accept: "application/vnd.github+json" }
    });
    if(res.status === 404) return null;
    if(!res.ok) throw new Error("GitHub-Fehler beim Lesen (" + res.status + ")");
    return res.json();
  }
  async function ghPut(path, base64Content, message, sha){
    const body = { message, content: base64Content, branch: CONFIG.branch };
    if(sha) body.sha = sha;
    const res = await fetch(API + "/contents/" + path, {
      method: "PUT",
      headers: {
        Authorization: "Bearer " + getToken(),
        Accept: "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error("GitHub-Fehler beim Schreiben (" + res.status + "): " + t.slice(0,200));
    }
    return res.json();
  }
  async function ghDelete(path, message, sha){
    const res = await fetch(API + "/contents/" + path, {
      method: "DELETE",
      headers: {
        Authorization: "Bearer " + getToken(),
        Accept: "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message, sha, branch: CONFIG.branch })
    });
    if(!res.ok) throw new Error("GitHub-Fehler beim Löschen (" + res.status + ")");
  }
  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(',')[1]);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }
  function slugify(name){
    const ts = Date.now();
    const clean = name.toLowerCase().replace(/[^a-z0-9.]+/g,'-').replace(/-+/g,'-');
    return ts + '-' + clean;
  }

  /* ---------- Manifest im Repo aktualisieren ---------- */
  async function saveManifest(newManifest, message){
    const current = await ghGet('images/manifest.json');
    await ghPut(
      'images/manifest.json',
      btoa(unescape(encodeURIComponent(JSON.stringify(newManifest, null, 2)))),
      message,
      current ? current.sha : null
    );
    manifest = newManifest;
  }

  /* ---------- Upload ---------- */
  async function uploadFiles(files){
    if(!getToken()) return;
    const targetGroup = document.getElementById('groupSelect').value || UNGROUPED;
    for(const file of files){
      if(!file.type.startsWith('image/')) continue;
      try{
        setStatus('Lade hoch: ' + file.name + ' …');
        const filename = slugify(file.name);
        const base64 = await fileToBase64(file);
        await ghPut('images/' + filename, base64, 'Bild hinzugefügt: ' + file.name);
        const title = file.name.replace(/\.[^.]+$/, '');
        const updated = Object.assign({}, manifest, {
          images: manifest.images.concat([{ file: filename, title, group: targetGroup }])
        });
        await saveManifest(updated, 'Manifest aktualisiert: ' + file.name);
        render();
        setStatus(file.name + ' hochgeladen.');
      }catch(e){
        setStatus(e.message, true);
        console.error(e);
      }
    }
  }

  async function removeImage(item){
    if(!getToken()) return;
    if(!confirm('„' + (item.title || item.file) + '" wirklich entfernen?')) return;
    try{
      setStatus('Entferne ' + item.file + ' …');
      const fileInfo = await ghGet('images/' + item.file);
      if(fileInfo) await ghDelete('images/' + item.file, 'Bild entfernt: ' + item.file, fileInfo.sha);
      const updated = Object.assign({}, manifest, {
        images: manifest.images.filter(m => m.file !== item.file)
      });
      await saveManifest(updated, 'Manifest aktualisiert: Entfernung ' + item.file);
      render();
      setStatus('Entfernt.');
    }catch(e){
      setStatus(e.message, true);
    }
  }

  /* ---------- Kurator-Login ---------- */
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const t = prompt('GitHub Personal Access Token (fine-grained, nur für dieses Repo, Contents: Read & Write):');
    if(!t) return;
    const trimmed = t.trim();
    setStatus('Token wird geprüft …');
    try{
      const res = await fetch(API, { headers: { Authorization: "Bearer " + trimmed, Accept: "application/vnd.github+json" } });
      if(!res.ok){
        setStatus('Ungültiges Token oder kein Zugriff auf dieses Repository (Status ' + res.status + '). Kurator-Zugang nicht aktiviert.', true);
        return;
      }
    }catch(e){
      setStatus('Token konnte nicht geprüft werden: ' + e.message, true);
      return;
    }
    localStorage.setItem(TOKEN_KEY, trimmed);
    applyCuratorState();
    setStatus('Kurator-Zugang aktiv.');
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem(TOKEN_KEY);
    applyCuratorState();
    setStatus('Abgemeldet.');
  });

  document.getElementById('addGroupBtn').addEventListener('click', addGroup);

  document.getElementById('fileInput').addEventListener('change', (e) => {
    uploadFiles([...e.target.files]);
    e.target.value = '';
  });

  /* ---------- Drag & Drop überall auf der Seite ---------- */
  let dragDepth = 0;
  window.addEventListener('dragenter', (e) => {
    if(!getToken()) return;
    e.preventDefault();
    dragDepth++;
    document.body.classList.add('dragging');
  });
  window.addEventListener('dragover', (e) => { if(getToken()) e.preventDefault(); });
  window.addEventListener('dragleave', () => {
    dragDepth = Math.max(0, dragDepth - 1);
    if(dragDepth === 0) document.body.classList.remove('dragging');
  });
  window.addEventListener('drop', (e) => {
    e.preventDefault();
    dragDepth = 0;
    document.body.classList.remove('dragging');
    if(!getToken()){ setStatus('Bitte zuerst über „Kurator-Zugang" anmelden.', true); return; }
    if(e.dataTransfer.files.length) uploadFiles([...e.dataTransfer.files]);
  });

  applyCuratorState();
  loadManifest();
})();
</script>
</body>
</html>
